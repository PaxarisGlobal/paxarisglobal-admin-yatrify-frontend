<!-- Floating Button -->
<button class="chat-fab" (click)="toggleChat()" [class.active]="isOpen" matTooltip="Chat with Yatri AI">
  <span class="fab-icon" *ngIf="!isOpen">
    <mat-icon>smart_toy</mat-icon>
    <span class="fab-pulse"></span>
  </span>
  <mat-icon *ngIf="isOpen">close</mat-icon>
  <span class="fab-label" *ngIf="!isOpen">Yatri AI</span>
</button>

<!-- Chat Window -->
<div class="chat-window" [class.open]="isOpen">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-avatar">
      <mat-icon>smart_toy</mat-icon>
    </div>
    <div class="chat-info">
      <strong>Yatri AI</strong>
      <span class="status">
        <span class="status-dot"></span>
        {{ isOrganizer ? 'Organizer Assistant' : 'Travel Assistant' }}
      </span>
    </div>
    <div class="header-actions">
      <button (click)="clearChat()" matTooltip="Clear chat">
        <mat-icon>refresh</mat-icon>
      </button>
      <button (click)="toggleChat()">
        <mat-icon>keyboard_arrow_down</mat-icon>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages">
    <div *ngFor="let msg of messages"
         class="message"
         [class.user]="msg.role === 'user'"
         [class.assistant]="msg.role === 'assistant'">

      <div class="message-avatar" *ngIf="msg.role === 'assistant'">
        <mat-icon>smart_toy</mat-icon>
      </div>

      <div class="message-bubble" [innerHTML]="formatMessage(msg.content)">
      </div>
    </div>

    <!-- Quick Suggestions (only on first message) -->
    <div class="quick-suggestions" *ngIf="messages.length === 1">
      <p>Quick Questions:</p>
      <button *ngFor="let s of QUICK_SUGGESTIONS"
              class="suggestion-chip"
              (click)="sendQuickSuggestion(s)">
        {{ s }}
      </button>
    </div>

    <!-- Loading -->
    <div class="message assistant" *ngIf="isLoading">
      <div class="message-avatar">
        <mat-icon>smart_toy</mat-icon>
      </div>
      <div class="message-bubble typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="inputMessage"
      (keyup.enter)="sendMessage()"
      placeholder="Ask me anything about your trip..."
      [disabled]="isLoading">
    <button class="send-btn" (click)="sendMessage()" [disabled]="!inputMessage.trim() || isLoading">
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
